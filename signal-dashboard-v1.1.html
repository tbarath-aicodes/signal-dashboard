// ── Indicators ────────────────────────────────────────────────────────────────
function calcRSI(c,n=14){
  if(c.length<n+1)return null;
  const d=c.slice(1).map((v,i)=>v-c[i]);
  let ag=d.slice(0,n).reduce((s,v)=>s+Math.max(v,0),0)/n,al=d.slice(0,n).reduce((s,v)=>s+Math.max(-v,0),0)/n;
  for(const v of d.slice(n)){ag=(ag*(n-1)+Math.max(v,0))/n;al=(al*(n-1)+Math.max(-v,0))/n;}
  return al===0?100:100-100/(1+ag/al);
}
function calcEMA(c,n){
  if(c.length<n)return null;
  const k=2/(n+1);let v=c.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for(const x of c.slice(n))v=x*k+v*(1-k);return v;
}
function calcMACD(c){
  if(c.length<35)return{line:null,sig:null};
  const s=[];for(let i=26;i<=c.length;i++){const e12=calcEMA(c.slice(0,i),12),e26=calcEMA(c.slice(0,i),26);if(e12&&e26)s.push(e12-e26);}
  return{line:s.at(-1)??null,sig:s.length>=9?calcEMA(s,9):null};
}
function calcSMA(c,n){return c.length<n?null:c.slice(-n).reduce((a,b)=>a+b,0)/n;}
function computeSignal(price,closes){
  const rsi=calcRSI(closes),{line:macd,sig:macdSig}=calcMACD(closes);
  const sma20=calcSMA(closes,20),sma50=calcSMA(closes,50);
  let score=0,reasons=[];
  if(rsi!==null){
    if(rsi<30){score+=2;reasons.push(`RSI ${rsi.toFixed(1)} — oversold`);}
    else if(rsi<45){score+=1;reasons.push(`RSI ${rsi.toFixed(1)} — bullish lean`);}
    else if(rsi>70){score-=2;reasons.push(`RSI ${rsi.toFixed(1)} — overbought`);}
    else if(rsi>55){score-=1;reasons.push(`RSI ${rsi.toFixed(1)} — bearish lean`);}
    else reasons.push(`RSI ${rsi.toFixed(1)} — neutral`);
  }
  if(macd!==null&&macdSig!==null){macd>macdSig?(score+=1,reasons.push('MACD above signal — bullish')):(score-=1,reasons.push('MACD below signal — bearish'));}
  if(price&&sma20){price>sma20?(score+=1,reasons.push('Price above SMA20')):(score-=1,reasons.push('Price below SMA20'));}
  if(sma20&&sma50){sma20>sma50?(score+=1,reasons.push('SMA20 > SMA50 — golden zone')):(score-=1,reasons.push('SMA20 < SMA50 — death zone'));}
  const tag=score>=3?'STRONG_BUY':score>=1?'BUY':score<=-3?'STRONG_SELL':score<=-1?'SELL':'NEUTRAL';
  return{tag,score,reasons,rsi:rsi?+rsi.toFixed(1):null,macd:macd?+macd.toFixed(3):null,macdSig:macdSig?+macdSig.toFixed(3):null,sma20:sma20?+sma20.toFixed(2):null,sma50:sma50?+sma50.toFixed(2):null};
}

// ── Alpaca ────────────────────────────────────────────────────────────────────
function aH(){return{'APCA-API-KEY-ID':KEY_ID,'APCA-API-SECRET-KEY':SECRET,'Accept':'application/json'};}
async function fetchSnap(sym){
  const r=await fetch(`${DATA_URL}/v2/stocks/${sym}/snapshot?feed=iex`,{headers:aH()});
  if(!r.ok)throw new Error(r.status===403?'Invalid credentials':r.status===422?`Unknown: ${sym}`:`HTTP ${r.status}`);
  const d=await r.json();
  return{price:d.latestTrade?.p??d.latestQuote?.ap??null,high:d.dailyBar?.h??null,low:d.dailyBar?.l??null,prevClose:d.prevDailyBar?.c??null,volume:d.dailyBar?.v??null};
}
async function fetchBars(sym){
  const start=new Date(Date.now()-90*864e5).toISOString();
  const r=await fetch(`${DATA_URL}/v2/stocks/${sym}/bars?timeframe=1Day&start=${start}&limit=60&adjustment=raw&feed=iex`,{headers:aH()});
  if(!r.ok)return[];
  const d=await r.json();return(d.bars||[]).map(b=>b.c);
}
async function loadTicker(sym){
  const[snap,bars]=await Promise.all([fetchSnap(sym),fetchBars(sym)]);
  if(!snap.price)throw new Error('No price data');
  const closes=bars.length?[...bars.slice(0,-1),snap.price]:[snap.price];
  const change=snap.prevClose?+(snap.price-snap.prevClose).toFixed(2):null;
  const changePct=snap.prevClose?+((snap.price-snap.prevClose)/snap.prevClose*100).toFixed(2):null;
  const sig=computeSignal(snap.price,closes);
  CLOSES[sym]=closes.slice(-30);
  return{...snap,change,changePct,closes:closes.slice(-30),...sig};
}

// ── AI ────────────────────────────────────────────────────────────────────────
async function fetchAI(sym,data){
  if(!ANTHROPIC_KEY)throw new Error('Add Anthropic API key to enable AI analysis');

  const systemPrompt=`You are a senior options trading analyst. Combine technical analysis with current market news to give specific, actionable options recommendations.

STRICT OPTIONS EXPIRY RULES:
- BUY CALL (LEAPS): minimum 1 year expiry. Format: "Jun 2027"
- SELL PUT: 1–2 week expiry ONLY. Format: "Jun 27 2026"
- SELL CALL: 1–2 week expiry ONLY. Format: "Jun 27 2026"
- BUY PUT: 2–4 week expiry. Format: "Jul 10 2026"

Today is June 19 2026.

CRITICAL JSON RULES:
- Return ONLY a single raw JSON object. No markdown. No backticks. No explanation before or after.
- All string values must be on ONE LINE — no newlines, no line breaks inside any string value.
- Use only plain ASCII characters in all strings. No smart quotes, no special symbols except $ % . / - and parentheses.
- Keep all string values concise — under 120 characters each.`;

  const userPrompt=`Analyze ${sym} for options trading. Search for latest news first, then return the JSON.

TECHNICALS: Price $${data.price?.toFixed(2)} | Change ${data.changePct?.toFixed(2)}% | RSI ${data.rsi??'N/A'} | MACD ${data.macd??'N/A'}/${data.macdSig??'N/A'} | SMA20 ${data.sma20?'$'+data.sma20:'N/A'} | SMA50 ${data.sma50?'$'+data.sma50:'N/A'} | Signal ${data.tag} (${data.score}/5)

Search: "${sym} stock news June 2026"

Return this exact JSON with ALL strings on single lines, under 120 chars each:
{"verdict":"BUY","summary":"3 sentences on setup and catalysts. Single line only.","news_catalyst":"Latest news in one line.","buy_call":{"strike":"$XXX","expiry":"Jun 2027","delta":"~0.55","rationale":"One line reason for LEAPS play."},"sell_put":{"strike":"$XXX","expiry":"Jun 27 2026","premium_est":"~$1.50","rationale":"One line income play reason."},"sell_call":{"strike":"$XXX","expiry":"Jun 27 2026","premium_est":"~$1.20","rationale":"One line covered call reason."},"buy_put":{"strike":"$XXX","expiry":"Jul 10 2026","rationale":"One line hedge reason."},"key_risk":"Single biggest risk in one line.","support":"$XXX","resistance":"$XXX"}`;

  const res=await fetch(ANTHROPIC,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1200,
      system: systemPrompt,
      messages:[{role:'user',content:userPrompt}],
      tools:[{type:'web_search_20250305',name:'web_search'}]
    })
  });
  if(!res.ok)throw new Error(`AI ${res.status}`);
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  const text=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');

  // Find the outermost JSON object
  const start=text.indexOf('{');
  if(start===-1)throw new Error('No JSON found in AI response');
  let depth=0,inStr=false,escape=false,end=-1;
  for(let i=start;i<text.length;i++){
    const ch=text[i];
    if(escape){escape=false;continue;}
    if(ch==='\\'){escape=true;continue;}
    if(ch==='"'){inStr=!inStr;continue;}
    if(inStr)continue;
    if(ch==='{')depth++;
    else if(ch==='}'){depth--;if(depth===0){end=i;break;}}
  }
  if(end===-1)throw new Error('Incomplete JSON in AI response');

  // Clean the extracted JSON — remove control characters inside strings
  let raw=text.slice(start,end+1);
  // Replace literal newlines/tabs inside string values with escaped versions
  raw=raw.replace(/("(?:[^"\\]|\\.)*")/g, m=>m.replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\t/g,'\\t'));

  try{
    return JSON.parse(raw);
  }catch(e){
    // Last resort: strip all control characters and try again
    const clean=raw.replace(/[\x00-\x1F\x7F]/g,' ');
    try{return JSON.parse(clean);}
    catch(e2){throw new Error('Could not parse AI response: '+e2.message);}
  }
}

  const t=TICKERS.find(x=>x.symbol===sym);if(!t||!t.data)return;
  t.aiLoading=true;t.ai=null;render();
  try{t.ai=await fetchAI(sym,t.data);}catch(e){t.ai={error:e.message};}

  activeAISym=sym;
  render();

}

function isMarketOpen(){
  const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  if(et.getDay()===0||et.getDay()===6)return false;
  const m=et.getHours()*60+et.getMinutes();return m>=570&&m<960;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function startStream(syms){
  if(ws){ws.close();ws=null;}
  ws=new WebSocket(STREAM_URL);
  ws.onopen=()=>ws.send(JSON.stringify({action:'auth',key:KEY_ID,secret:SECRET}));
  ws.onmessage=(evt)=>{
    const msgs=JSON.parse(evt.data);
    for(const msg of msgs){
      if(msg.T==='success'&&msg.msg==='authenticated'){ws.send(JSON.stringify({action:'subscribe',trades:syms}));streamingSymbols=syms;render();}
      if(msg.T==='t'){
        const t=TICKERS.find(x=>x.symbol===msg.S);
        if(t&&t.data){
          const price=msg.p,closes=[...(CLOSES[msg.S]||[]).slice(0,-1),price];
          const change=t.data.prevClose?+(price-t.data.prevClose).toFixed(2):t.data.change;
          const changePct=t.data.prevClose?+((price-t.data.prevClose)/t.data.prevClose*100).toFixed(2):t.data.changePct;
          t.data={...t.data,price,change,changePct,closes,...computeSignal(price,closes)};
          CLOSES[msg.S]=closes;render();
        }
      }
      if(msg.T==='error'){streamingSymbols=[];render();}
    }
  };
  ws.onerror=()=>{streamingSymbols=[];render();};
  ws.onclose=()=>{streamingSymbols=[];render();};
}
function stopStream(){if(ws){ws.close();ws=null;}streamingSymbols=[];render();}

// ── UI helpers ────────────────────────────────────────────────────────────────
function spark(closes,color){
  if(!closes||closes.length<2)return'';
  const mn=Math.min(...closes),mx=Math.max(...closes),r=mx-mn||1,W=68,H=24;
  const pts=closes.map((v,i)=>`${(i/(closes.length-1))*W},${H-((v-mn)/r)*H}`).join(' ');
  return`<svg width="${W}" height="${H}" style="display:block;overflow:visible;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
function row(label,val,color){
  return`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #f1f5f9">
    <span style="font-size:10px;color:#64748b;font-family:monospace">${label}</span>
    <span style="font-size:10px;color:${color};font-weight:700;font-family:monospace">${val}</span>
  </div>`;
}
function aiInlinePanel(sym){

}

let TOP_RECS = null; // {loading, error, strategies:{}, market_context, generatedAt}
let CHAT_MESSAGES = []; // [{role:'user'|'assistant', text, ts}]
let CHAT_LOADING = false;
let chatCollapsed = false;

async function fetchTopRecs(){
  if(!ANTHROPIC_KEY){TOP_RECS={loading:false,error:null,strategies:{},market_context:'',generatedAt:''};render();return;}
  TOP_RECS={loading:true,error:null,strategies:{},market_context:'',generatedAt:null};
  render();

  const snapshot=TICKERS.filter(t=>t.data&&t.data.price).map(t=>{
    const d=t.data,sec=CLEAN.find(s=>s.tickers.includes(t.symbol));
    return `${t.symbol}(${sec?.name?.replace(/[^\w\s]/g,'').trim()||''}):$${d.price?.toFixed(2)} ${d.changePct>=0?'+':''}${d.changePct?.toFixed(2)}% RSI:${d.rsi??'N/A'} MACD:${d.macd??'N/A'} SMA20:${d.sma20?'$'+d.sma20:'N/A'} ${d.tag}(${d.score}/5)`;
  }).join('\n');

  const systemPrompt=`You are a professional options trader. Analyze a watchlist and return ALL stocks that qualify with 80%+ confidence for each of 4 strategies. There can be multiple picks per strategy.

EXPIRY RULES:
- BUY CALL: 1 year+ out e.g. "Jun 2027"
- SELL CALL: 1-2 weeks e.g. "Jun 27 2026"
- BUY PUT: 2-4 weeks e.g. "Jul 10 2026"
- SELL PUT: 1-2 weeks e.g. "Jun 27 2026"
Today: June 19 2026.
Each pick: {"symbol":"X","strike":"$X","expiry":"X","confidence":85,"thesis":"one line","catalyst":"one line","risk":"one line"}
ALL strings single line under 100 chars ASCII only. Return ONLY raw JSON no markdown.`;

  const userPrompt=`Watchlist:\n${snapshot}\n\nSearch "options opportunities tech stocks June 2026" then return ONLY this JSON. Each strategy key is an ARRAY of all qualifying picks (empty array [] if none reach 80%):
{"market_context":"1 sentence market read.","generated_at":"TIME","buy_call":[{"symbol":"XXX","strike":"$XXX","expiry":"Jun 2027","confidence":85,"thesis":"one line","catalyst":"one line","risk":"one line"}],"sell_call":[{"symbol":"XXX","strike":"$XXX","expiry":"Jun 27 2026","confidence":82,"thesis":"one line","catalyst":"one line","risk":"one line"}],"buy_put":[{"symbol":"XXX","strike":"$XXX","expiry":"Jul 10 2026","confidence":83,"thesis":"one line","catalyst":"one line","risk":"one line"}],"sell_put":[{"symbol":"XXX","strike":"$XXX","expiry":"Jun 27 2026","confidence":84,"thesis":"one line","catalyst":"one line","risk":"one line"}]}`;

  try{
    const res=await fetch(ANTHROPIC,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,system:systemPrompt,messages:[{role:'user',content:userPrompt}],tools:[{type:'web_search_20250305',name:'web_search'}]})
    });
    if(!res.ok) throw new Error(`API ${res.status}`);
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    const text=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const start=text.indexOf('{');
    if(start===-1) throw new Error('No JSON found');
    let depth=0,inStr=false,escape=false,end=-1;
    for(let i=start;i<text.length;i++){
      const ch=text[i];
      if(escape){escape=false;continue;}if(ch==='\\'){escape=true;continue;}
      if(ch==='"'){inStr=!inStr;continue;}if(inStr)continue;
      if(ch==='{')depth++;else if(ch==='}'){depth--;if(depth===0){end=i;break;}}
    }
    let raw=end===-1?text.slice(start):text.slice(start,end+1);
    raw=raw.replace(/("(?:[^"\\]|\\.)*")/g,m=>m.replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\t/g,'\\t'));
    if(end===-1){
      // repair: close open brackets
      const ob=(raw.match(/\[/g)||[]).length-(raw.match(/\]/g)||[]).length;
      const oc=(raw.match(/\{/g)||[]).length-(raw.match(/\}/g)||[]).length;
      raw=raw.replace(/,\s*\{[^}]*$/,'').replace(/,\s*$/,'');
      for(let i=0;i<ob;i++) raw+=']';
      for(let i=0;i<oc;i++) raw+='}';
    }
    const parsed=JSON.parse(raw);
    // normalise — if model returned single object instead of array, wrap it
    const norm=v=>Array.isArray(v)?v:v&&v.symbol?[v]:[];
    TOP_RECS={
      loading:false,error:null,
      market_context:parsed.market_context||'',
      generatedAt:parsed.generated_at||new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'})+' ET',
      strategies:{
        buy_call:  norm(parsed.buy_call),
        sell_call: norm(parsed.sell_call),
        buy_put:   norm(parsed.buy_put),
        sell_put:  norm(parsed.sell_put),
      }
    };
  }catch(e){
    TOP_RECS={loading:false,error:e.message,strategies:{},market_context:'',generatedAt:''};
  }
  render();
}

  const confColor=pick.confidence>=90?'#15803d':pick.confidence>=85?'#0369a1':'#854d0e';
  const confBg=pick.confidence>=90?'#dcfce7':pick.confidence>=85?'#dbeafe':'#fef9c3';
  return `<div style="flex:0 0 220px;background:#fff;border:1.5px solid ${border}44;border-radius:10px;padding:11px 13px;box-shadow:0 1px 4px ${border}11">
    <!-- Symbol + Strike -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
      <div>
        <div style="font-family:monospace;font-weight:800;font-size:16px;color:#0f172a">${pick.symbol}</div>
        <div style="font-size:9px;color:#64748b;margin-top:1px">🗓 ${pick.expiry}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:17px;font-weight:800;color:${text};font-family:monospace">${pick.strike}</div>
        <div style="background:${confBg};color:${confColor};font-size:9px;font-weight:800;padding:1px 6px;border-radius:6px;margin-top:2px">${pick.confidence}%</div>
      </div>
    </div>
    <!-- Confidence bar -->
    <div style="height:3px;background:#f1f5f9;border-radius:2px;margin-bottom:7px;overflow:hidden">
      <div style="height:3px;width:${pick.confidence}%;background:${confColor};border-radius:2px"></div>
    </div>
    <!-- Thesis -->
    <div style="font-size:10px;color:#334155;line-height:1.5;margin-bottom:6px;font-weight:500">${pick.thesis}</div>
    <!-- Catalyst + Risk -->
    <div style="font-size:9px;line-height:1.6;color:#64748b">
      ${pick.catalyst?`<div>📰 ${pick.catalyst}</div>`:''}
      ${pick.risk?`<div style="color:#9a3412;margin-top:2px">⚠ ${pick.risk}</div>`:''}
    </div>
  </div>`;
}

  const hasPicks = picks && picks.length > 0;
  return `<div style="background:${bg};border:2px solid ${border}44;border-radius:12px;overflow:hidden;margin-bottom:10px">

async function sendChat(){
  const input = document.getElementById('chat-input');
  const text = input?.value.trim();
  if(!text || CHAT_LOADING || !ANTHROPIC_KEY) return;

  const ts = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  CHAT_MESSAGES.push({role:'user', text, ts});
  if(input){ input.value=''; input.style.height='auto'; }
  CHAT_LOADING = true;
  render();
  scrollChatToBottom();

  // Build watchlist context
  const ctx = TICKERS.filter(t=>t.data?.price).map(t=>{
    const d=t.data;
    return `${t.symbol}: $${d.price?.toFixed(2)} ${d.changePct>=0?'+':''}${d.changePct?.toFixed(2)}% | RSI ${d.rsi??'N/A'} | MACD ${d.macd??'N/A'} | SMA20 ${d.sma20?'$'+d.sma20:'N/A'} | ${d.tag} (${d.score}/5)`;
  }).join('\n');

  // Build conversation history for multi-turn
  const history = CHAT_MESSAGES.slice(-10).map(m=>({
    role: m.role==='user'?'user':'assistant',
    content: m.text
  }));

  const systemPrompt = `You are an expert stock and options trading analyst with access to the user's live watchlist data. Answer questions clearly and concisely. Format numbers with $ and %. Use **bold** for key points. Keep responses focused and actionable — under 200 words unless a detailed comparison is asked for.

Current watchlist (live data):
${ctx}

Today: June 19 2026. When discussing options: BUY CALL = bullish LEAPS 1yr+, SELL PUT = income 1-2 weeks, SELL CALL = 1-2 weeks, BUY PUT = hedge 2-4 weeks.`;

  try {
    const res = await fetch(ANTHROPIC, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        system: systemPrompt,
        messages: history,
        tools:[{type:'web_search_20250305',name:'web_search'}]
      })
    });
    if(!res.ok) throw new Error(`API ${res.status}`);
    const d = await res.json();
    if(d.error) throw new Error(d.error.message);
    const replyText = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    const replyTs = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    CHAT_MESSAGES.push({role:'assistant', text:replyText||'Sorry, I could not generate a response.', ts:replyTs});
  } catch(e) {
    const errTs = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    CHAT_MESSAGES.push({role:'assistant', text:`⚠ Error: ${e.message}`, ts:errTs});
  }

  CHAT_LOADING = false;
  render();
  scrollChatToBottom();
}

function sendSuggestion(q){
  const input = document.getElementById('chat-input');
  if(input){ input.value=q; }
  sendChat();
}

function clearChat(){
  CHAT_MESSAGES=[];
  render();
}

function scrollChatToBottom(){

let activeTab = 'picks';
function switchTab(tab){
  activeTab = tab;
  // On mobile: show/hide sections
  ['picks','chat','watchlist','settings'].forEach(t=>{
    const sec=document.getElementById('page-'+t);
    const btn=document.getElementById('nav-'+t);
    if(sec) sec.style.display = t===tab?'block':'none';
    if(btn) btn.classList.toggle('active', t===tab);
  });
  // Settings tab — scroll to key panel
  if(tab==='settings'){
    const el=document.querySelector('[onclick="toggleKeyPanel()"]');
    if(el){el.closest('div')?.scrollIntoView({behavior:'smooth'});}
    // Make settings page show the key panels
    const pg=document.getElementById('page-settings');
    if(pg) pg.style.display='block';
  }

}

function saveAnthropicKey(){
  const k=document.getElementById('anthropicKeyIn')?.value.trim();
  if(!k){const el=document.getElementById('aiKeyErr');if(el){el.textContent='⚠ Please paste your Anthropic API key.';el.style.display='block';}return;}
  ANTHROPIC_KEY=k;aiPanelOpen=false;TOP_RECS=null;render();
}
function clearAnthropicKey(){ANTHROPIC_KEY='';aiPanelOpen=true;render();}
async function connect(){
  const kid=document.getElementById('keyIdIn')?.value.trim();
  const sec=document.getElementById('secretIn')?.value.trim();
  if(!kid||!sec){showConnErr('Alpaca Key ID and Secret are required.');return;}
  const btn=document.getElementById('connectBtn');if(btn){btn.textContent='Connecting…';btn.disabled=true;}
  try{
    KEY_ID=kid;SECRET=sec;
    await fetchSnap('NVDA');
    keyPanelOpen=false;
    await reloadAll();
    startStream(TICKERS.map(t=>t.symbol));
  }catch(e){
    KEY_ID='';SECRET='';ANTHROPIC_KEY='';
    showConnErr(e.message.includes('403')||e.message.includes('Invalid')?'Invalid credentials — check your Key ID and Secret.':e.message);
    if(btn){btn.textContent='Connect';btn.disabled=false;}
  }
}
function showConnErr(m){const el=document.getElementById('connErr');if(el){el.textContent='⚠ '+m;el.style.display='block';}}
function disconnect(){stopStream();KEY_ID='';SECRET='';clearInterval(autoInterval);autoInterval=null;keyPanelOpen=true;render();}
function updateTs(){const el=document.getElementById('lastUpd');if(el)el.textContent=`🕐 ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'})} ET`;}
function afterRender(){initMobileNav();scrollChatToBottom();}
async function reloadOne(sym){
  const t=TICKERS.find(x=>x.symbol===sym);if(!t)return;
  t.loading=true;t.error=null;render();
  try{t.data=await loadTicker(sym);}catch(e){t.error=e.message;}
  t.loading=false;updateTs();render();
}
async function reloadAll(){
  await Promise.all(TICKERS.map(async t=>{
    t.loading=true;t.error=null;
    try{t.data=await loadTicker(t.symbol);}catch(e){t.error=e.message;}
    t.loading=false;
  }));
  updateTs();render();
  // Auto-generate top recommendations after data refresh
  if(ANTHROPIC_KEY) fetchTopRecs();
}
function toggleAuto(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null;}
  else{autoInterval=setInterval(()=>{if(isMarketOpen())reloadAll();},60*60*1000);}
  render();
}
function removeTicker(sym){
  TICKERS=TICKERS.filter(t=>t.symbol!==sym);
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({action:'unsubscribe',trades:[sym]}));
  streamingSymbols=streamingSymbols.filter(s=>s!==sym);
  render();
}

<script>
// ── PWA Service Worker ─────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Install prompt ─────────────────────────────────────────────────────────
let deferredPrompt = null;
const banner = document.getElementById('pwa-banner');
const installBtn = document.getElementById('pwa-install');
const dismissBtn = document.getElementById('pwa-dismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if(banner) banner.style.display = 'flex';
});

if(installBtn) installBtn.addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if(outcome === 'accepted') banner.style.display = 'none';
  deferredPrompt = null;
});

if(dismissBtn) dismissBtn.addEventListener('click', () => {
  if(banner) banner.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  if(banner) banner.style.display = 'none';
  deferredPrompt = null;
});
</script>
