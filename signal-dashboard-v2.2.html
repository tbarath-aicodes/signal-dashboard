// ── Indicators ────────────────────────────────────────────────────────────────
function calcRSI(c,n=14){
  if(c.length<n+1)return null;
  const d=c.slice(1).map((v,i)=>v-c[i]);
  let ag=d.slice(0,n).reduce((s,v)=>s+Math.max(v,0),0)/n,al=d.slice(0,n).reduce((s,v)=>s+Math.max(-v,0),0)/n;
  for(const v of d.slice(n)){ag=(ag*(n-1)+Math.max(v,0))/n;al=(al*(n-1)+Math.max(-v,0))/n;}
  return al===0?100:100-100/(1+ag/al);
}
function calcEMA(c,n){
  if(c.length<n)return null;
  const k=2/(n+1);let v=c.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for(const x of c.slice(n))v=x*k+v*(1-k);return v;
}
function calcMACD(c){
  if(c.length<35)return{line:null,sig:null};
  const s=[];for(let i=26;i<=c.length;i++){const e12=calcEMA(c.slice(0,i),12),e26=calcEMA(c.slice(0,i),26);if(e12&&e26)s.push(e12-e26);}
  return{line:s.at(-1)??null,sig:s.length>=9?calcEMA(s,9):null};
}
function calcSMA(c,n){return c.length<n?null:c.slice(-n).reduce((a,b)=>a+b,0)/n;}
function computeSignal(price,closes){
  const rsi=calcRSI(closes),{line:macd,sig:macdSig}=calcMACD(closes);
  const sma20=calcSMA(closes,20),sma50=calcSMA(closes,50);
  let score=0,reasons=[];
  if(rsi!==null){
    if(rsi<30){score+=2;reasons.push(`RSI ${rsi.toFixed(1)} — oversold`);}
    else if(rsi<45){score+=1;reasons.push(`RSI ${rsi.toFixed(1)} — bullish lean`);}
    else if(rsi>70){score-=2;reasons.push(`RSI ${rsi.toFixed(1)} — overbought`);}
    else if(rsi>55){score-=1;reasons.push(`RSI ${rsi.toFixed(1)} — bearish lean`);}
    else reasons.push(`RSI ${rsi.toFixed(1)} — neutral`);
  }
  if(macd!==null&&macdSig!==null){macd>macdSig?(score+=1,reasons.push('MACD above signal — bullish')):(score-=1,reasons.push('MACD below signal — bearish'));}
  if(price&&sma20){price>sma20?(score+=1,reasons.push('Price above SMA20')):(score-=1,reasons.push('Price below SMA20'));}
  if(sma20&&sma50){sma20>sma50?(score+=1,reasons.push('SMA20 > SMA50 — golden zone')):(score-=1,reasons.push('SMA20 < SMA50 — death zone'));}
  const tag=score>=3?'STRONG_BUY':score>=1?'BUY':score<=-3?'STRONG_SELL':score<=-1?'SELL':'NEUTRAL';
  return{tag,score,reasons,rsi:rsi?+rsi.toFixed(1):null,macd:macd?+macd.toFixed(3):null,macdSig:macdSig?+macdSig.toFixed(3):null,sma20:sma20?+sma20.toFixed(2):null,sma50:sma50?+sma50.toFixed(2):null};
}

// ── Alpaca ────────────────────────────────────────────────────────────────────
function aH(){return{'APCA-API-KEY-ID':KEY_ID,'APCA-API-SECRET-KEY':SECRET,'Accept':'application/json'};}
async function fetchSnap(sym){
  const r=await fetch(`${DATA_URL}/v2/stocks/${sym}/snapshot?feed=iex`,{headers:aH()});
  if(!r.ok)throw new Error(r.status===403?'Invalid credentials':r.status===422?`Unknown: ${sym}`:`HTTP ${r.status}`);
  const d=await r.json();
  return{price:d.latestTrade?.p??d.latestQuote?.ap??null,high:d.dailyBar?.h??null,low:d.dailyBar?.l??null,prevClose:d.prevDailyBar?.c??null,volume:d.dailyBar?.v??null};
}
async function fetchBars(sym){
  const start=new Date(Date.now()-90*864e5).toISOString();
  const r=await fetch(`${DATA_URL}/v2/stocks/${sym}/bars?timeframe=1Day&start=${start}&limit=60&adjustment=raw&feed=iex`,{headers:aH()});
  if(!r.ok)return[];
  const d=await r.json();return(d.bars||[]).map(b=>b.c);
}
async function loadTicker(sym){
  const[snap,bars]=await Promise.all([fetchSnap(sym),fetchBars(sym)]);
  if(!snap.price)throw new Error('No price data');
  const closes=bars.length?[...bars.slice(0,-1),snap.price]:[snap.price];
  const change=snap.prevClose?+(snap.price-snap.prevClose).toFixed(2):null;
  const changePct=snap.prevClose?+((snap.price-snap.prevClose)/snap.prevClose*100).toFixed(2):null;
  const sig=computeSignal(snap.price,closes);
  CLOSES[sym]=closes.slice(-30);
  return{...snap,change,changePct,closes:closes.slice(-30),...sig};
}

// ── AI ────────────────────────────────────────────────────────────────────────
async function fetchAI(sym,data){
  if(!ANTHROPIC_KEY)throw new Error('Add Anthropic API key to enable AI analysis');
  const systemPrompt=`You are a senior options trading analyst who combines technical analysis, fundamental valuation, and market news to give actionable options recommendations.

VALUATION-DRIVEN OPTIONS STRATEGY (V2.2):
Look up P/E, Forward P/E, and industry average P/E via web search, then apply this logic:

VALUATION VERDICTS:
- CHEAP: Forward P/E significantly below industry avg, OR stock down 20%+ from 52wk high with strong fundamentals
- FAIR: Within 15% of industry average P/E
- RICH: Forward P/E well above industry avg, priced for perfection

OPTIONS RATING BASED ON VALUATION:
- SELL PUT (CSP): Rate HIGH when CHEAP (you WANT to own it at an even cheaper cost basis via assignment). Rate LOW when RICH.
- SELL CALL (Covered): Rate HIGH when RICH+overbought. Rate LOW/AVOID when CHEAP (do NOT cap upside on beaten-down stock).
- BUY CALL LEAPS: Rate HIGH when CHEAP+beaten-down+strong fundamentals. Rate LOW when RICH.
- BUY PUT: Rate HIGH when RICH+RSI>65. Rate LOW when CHEAP.

STRICT EXPIRY RULES — compute these dynamically from TODAY_DATE, do NOT copy the example dates literally:
- BUY CALL (LEAPS): minimum 1 year from today. Example format only: "Jun 2027"
- SELL PUT: pick a Friday 1-2 weeks from today. Example format only: "Jul 10 2026"
- SELL CALL: pick a Friday 1-2 weeks from today. Example format only: "Jul 10 2026"
- BUY PUT: pick a Friday 2-4 weeks from today. Example format only: "Jul 24 2026"
TODAY_DATE is ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}. Calculate all expiry dates relative to this real date — the example dates above are just formatting templates, not the actual dates to use.

Return ONLY a single raw JSON object. No markdown. No backticks. All strings on ONE LINE under 130 chars. Plain ASCII only.`;

  const userPrompt=`Analyze ${sym} for value-aware options trading. Search for P/E, Forward P/E, industry avg P/E, 52wk high, recent news.

TECHNICALS: Price $${data.price?.toFixed(2)} | Change ${data.changePct?.toFixed(2)}% | RSI ${data.rsi??'N/A'} | MACD ${data.macd??'N/A'}/${data.macdSig??'N/A'} | SMA20 ${data.sma20?'$'+data.sma20:'N/A'} | SMA50 ${data.sma50?'$'+data.sma50:'N/A'} | Signal ${data.tag} (${data.score}/5)

Search: "${sym} P/E ratio forward PE industry average 2026" and "${sym} stock news June 2026"

Return this exact JSON (all strings single line, under 130 chars, ASCII only):
{"verdict":"BUY","summary":"2-3 sentence assessment.","pe":28.5,"forward_pe":22.1,"industry_pe":30.0,"val_verdict":"cheap","val_context":"2 sentence valuation vs peers and options strategy implication.","news_catalyst":"Latest news one line.","market_trend":"1 sentence sector trend.","buy_call":{"strike":"$XXX","expiry":"<calc: ~1yr+ from today, format Mon YYYY>","delta":"~0.55","rating":"HIGH","rationale":"One line LEAPS rationale."},"sell_put":{"strike":"$XXX","expiry":"<calc: Friday 1-2wks from today, format Mon DD YYYY>","premium_est":"~$1.50","rating":"HIGH","rationale":"One line CSP rationale."},"sell_call":{"strike":"$XXX","expiry":"<calc: Friday 1-2wks from today, format Mon DD YYYY>","premium_est":"~$1.20","rating":"LOW","rationale":"One line CC rationale."},"buy_put":{"strike":"$XXX","expiry":"<calc: Friday 2-4wks from today, format Mon DD YYYY>","rating":"LOW","rationale":"One line hedge rationale."},"key_risk":"Single biggest risk one line.","support":"$XXX","resistance":"$XXX"}`;

  const res=await fetch(ANTHROPIC,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1400,system:systemPrompt,messages:[{role:'user',content:userPrompt}],tools:[{type:'web_search_20250305',name:'web_search'}]})
  });
  if(!res.ok)throw new Error(`AI ${res.status}`);
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  const text=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  // ── Bulletproof JSON extractor ──────────────────────────────────────────────
  // Finds the FIRST complete {...} block, ignores anything before or after it.
  function extractJSON(str){
    const start=str.indexOf('{');
    if(start===-1) throw new Error('No JSON found in AI response');
    let depth=0,inStr=false,esc=false,end=-1;
    for(let i=start;i<str.length;i++){
      const ch=str[i];
      if(esc){esc=false;continue;}
      if(ch==='\\'){esc=true;continue;}
      if(ch==='"'){inStr=!inStr;continue;}
      if(inStr)continue;
      if(ch==='{')depth++;
      else if(ch==='}'){depth--;if(depth===0){end=i;break;}}
    }
    if(end===-1) throw new Error('Incomplete JSON object in AI response');
    let raw=str.slice(start,end+1);
    // Fix literal newlines/tabs inside string values only
    let fixed='',inS=false,es=false;
    for(let i=0;i<raw.length;i++){
      const ch=raw[i];
      if(es){fixed+=ch;es=false;continue;}
      if(ch==='\\'){fixed+=ch;es=true;continue;}
      if(ch==='"'){fixed+=ch;inS=!inS;continue;}
      if(inS){
        if(ch==='\n'){fixed+='\\n';continue;}
        if(ch==='\r'){fixed+='\\r';continue;}
        if(ch==='\t'){fixed+='\\t';continue;}
      }
      fixed+=ch;
    }
    try{return JSON.parse(fixed);}
    catch(e){
      // Last resort: strip all ASCII control chars and retry
      const clean=fixed.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,'');
      try{return JSON.parse(clean);}
      catch(e2){throw new Error('JSON parse failed: '+e2.message+' — raw: '+fixed.slice(0,120));}
    }
  }
  return extractJSON(text);
}

async function getAI(sym){
  const t=TICKERS.find(x=>x.symbol===sym);if(!t||!t.data)return;
  t.aiLoading=true;t.ai=null;render();
  try{
    t.ai=await fetchAI(sym,t.data);
    if(t.ai&&!t.ai.error){
      t.pe=t.ai.pe||null;t.forwardPe=t.ai.forward_pe||null;
      t.industryPe=t.ai.industry_pe||null;t.valVerdict=t.ai.val_verdict||'unknown';
    }
  }catch(e){t.ai={error:e.message};}
  t.aiLoading=false;activeAISym=sym;render();
  setTimeout(()=>{const el=document.getElementById('ai-inline-'+sym);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},50);

// ── Market ────────────────────────────────────────────────────────────────────
function isMarketOpen(){
  const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  if(et.getDay()===0||et.getDay()===6)return false;
  const m=et.getHours()*60+et.getMinutes();return m>=570&&m<960;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function startStream(syms){
  if(ws){ws.close();ws=null;}
  ws=new WebSocket(STREAM_URL);
  ws.onopen=()=>ws.send(JSON.stringify({action:'auth',key:KEY_ID,secret:SECRET}));
  ws.onmessage=(evt)=>{
    const msgs=JSON.parse(evt.data);
    for(const msg of msgs){
      if(msg.T==='success'&&msg.msg==='authenticated'){
        ws.send(JSON.stringify({action:'subscribe',trades:syms}));
        streamingSymbols=syms;render();
      }
      if(msg.T==='t'){
        const t=TICKERS.find(x=>x.symbol===msg.S);
        if(t&&t.data){
          const price=msg.p,closes=[...(CLOSES[msg.S]||[]).slice(0,-1),price];
          const change=t.data.prevClose?+(price-t.data.prevClose).toFixed(2):t.data.change;
          const changePct=t.data.prevClose?+((price-t.data.prevClose)/t.data.prevClose*100).toFixed(2):t.data.changePct;
          t.data={...t.data,price,change,changePct,closes,...computeSignal(price,closes)};
          CLOSES[msg.S]=closes;
          // ── FIX: only do surgical price update if user is typing ──
          if(userIsTyping()){
            updatePriceOnly(msg.S,t.data);
          } else {
            render();
          }
        }
      }
      if(msg.T==='error'){streamingSymbols=[];render();}
    }
  };
  ws.onerror=()=>{streamingSymbols=[];render();};
  ws.onclose=()=>{streamingSymbols=[];render();};
}
function stopStream(){if(ws){ws.close();ws=null;}streamingSymbols=[];render();}

// ── UI helpers ────────────────────────────────────────────────────────────────
function spark(closes,color){
  if(!closes||closes.length<2)return'';
  const mn=Math.min(...closes),mx=Math.max(...closes),r=mx-mn||1,W=68,H=24;
  const pts=closes.map((v,i)=>`${(i/(closes.length-1))*W},${H-((v-mn)/r)*H}`).join(' ');
  return`<svg width="${W}" height="${H}" style="display:block;overflow:visible;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
function row(label,val,color){
  return`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #f1f5f9">
    <span style="font-size:10px;color:#64748b;font-family:monospace">${label}</span>
    <span style="font-size:10px;color:${color};font-weight:700;font-family:monospace">${val}</span>
  </div>`;
}
function ratingBadge(r){
  const map={HIGH:{bg:'#dcfce7',c:'#15803d'},MEDIUM:{bg:'#fefce8',c:'#854d0e'},LOW:{bg:'#f8fafc',c:'#64748b'},AVOID:{bg:'#fef2f2',c:'#b91c1c'}};
  const s=map[r]||map.LOW;
  return`<span style="font-size:8px;font-weight:800;background:${s.bg};color:${s.c};padding:1px 6px;border-radius:4px;font-family:monospace">${r||'—'}</span>`;
}

  const userPrompt=`Watchlist:\n${snapshot}\n\nSearch "tech stock valuation options June 2026" then return ONLY:\n{"market_context":"1 sentence.","generated_at":"TIME","buy_call":[...],"sell_call":[...],"buy_put":[...],"sell_put":[...]}`;
  try{
    const res=await fetch(ANTHROPIC,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,system:systemPrompt,messages:[{role:'user',content:userPrompt}],tools:[{type:'web_search_20250305',name:'web_search'}]})});
    if(!res.ok)throw new Error(`API ${res.status}`);
    const d=await res.json();if(d.error)throw new Error(d.error.message);
    const text=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    function extractJ(str){
      const s=str.indexOf('{');if(s===-1)throw new Error('No JSON');

      for(let i=s;i<str.length;i++){const c=str[i];if(es){es=false;continue;}if(c==='\\'){es=true;continue;}if(c==='"'){inS=!inS;continue;}if(inS)continue;if(c==='{')dep++;else if(c==='}'){dep--;if(dep===0){en=i;break;}}}
      const chunk=str.slice(s,en===-1?undefined:en+1);
      let fix='',iS=false,e2=false;
      for(let i=0;i<chunk.length;i++){const c=chunk[i];if(e2){fix+=c;e2=false;continue;}if(c==='\\'){fix+=c;e2=true;continue;}if(c==='"'){fix+=c;iS=!iS;continue;}if(iS){if(c==='\n'){fix+='\\n';continue;}if(c==='\r'){fix+='\\r';continue;}if(c==='\t'){fix+='\\t';continue;}}fix+=c;}
      try{return JSON.parse(fix);}catch(e){
        let r=fix.replace(/,\s*[\[{][^\]\}]*$/,'').replace(/,\s*$/,'');

      }

  const history=CHAT_MESSAGES.slice(-10).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
  try{
    const res=await fetch(ANTHROPIC,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:`You are an expert stock and options trading analyst. Value-first: CSP=best on cheap stocks, LEAPS=beaten-down cheap, CC=only when rich. Use **bold** for key points. Under 200 words.\n\nWatchlist:\n${ctx}\n\nToday: ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}.`,messages:history,tools:[{type:'web_search_20250305',name:'web_search'}]})});
    if(!res.ok)throw new Error(`API ${res.status}`);
    const d=await res.json();if(d.error)throw new Error(d.error.message);
    const replyText=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    CHAT_MESSAGES.push({role:'assistant',text:replyText||'Sorry, could not generate a response.',ts:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})});
  }catch(e){CHAT_MESSAGES.push({role:'assistant',text:`⚠ Error: ${e.message}`,ts:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})});}
  CHAT_LOADING=false;render();scrollChatToBottom();
}
function sendSuggestion(q){const input=document.getElementById('chat-input');if(input)input.value=q;sendChat();}
function clearChat(){CHAT_MESSAGES=[];render();}
function toggleChat(){chatCollapsed=!chatCollapsed;render();}
function scrollChatToBottom(){setTimeout(()=>{const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight;},50);}

// ── Actions ───────────────────────────────────────────────────────────────────
let activeTab="picks";
function switchTab(tab){activeTab=tab;["picks","chat","watchlist","settings"].forEach(t=>{const sec=document.getElementById("page-"+t),btn=document.getElementById("nav-"+t);if(sec)sec.style.display=t===tab?"block":"none";if(btn)btn.classList.toggle("active",t===tab);});window.scrollTo({top:0,behavior:"smooth"});}
function initMobileNav(){if(window.innerWidth>640)return;switchTab(activeTab);}
function toggleKeyPanel(){keyPanelOpen=!keyPanelOpen;render();}
let activeAISym=null;
function toggleAIPanel(sym){activeAISym=activeAISym===sym?null:sym;render();}
function saveAnthropicKey(){
  const k=document.getElementById("anthropicKeyIn")?.value.trim();
  if(!k){const el=document.getElementById("aiKeyErr");if(el){el.textContent="⚠ Please paste your Anthropic API key.";el.style.display="block";}return;}
  const btn=document.getElementById("saveKeyBtn");
  if(btn){btn.textContent="✓ Saving…";btn.disabled=true;btn.style.background="#5b21b6";}
  setTimeout(()=>{ANTHROPIC_KEY=k;aiPanelOpen=false;TOP_RECS=null;render();},350);
}
function clearAnthropicKey(){ANTHROPIC_KEY="";aiPanelOpen=true;render();}
async function connect(){
  const kid=document.getElementById("keyIdIn")?.value.trim(),sec=document.getElementById("secretIn")?.value.trim();
  if(!kid||!sec){showConnErr("Alpaca Key ID and Secret are required.");return;}
  const btn=document.getElementById("connectBtn");if(btn){btn.textContent="Connecting…";btn.disabled=true;}
  try{KEY_ID=kid;SECRET=sec;await fetchSnap("NVDA");keyPanelOpen=false;await reloadAll();startStream(TICKERS.map(t=>t.symbol));}
  catch(e){KEY_ID="";SECRET="";showConnErr(e.message.includes("403")||e.message.includes("Invalid")?"Invalid credentials.":e.message);if(btn){btn.textContent="Connect to Alpaca";btn.disabled=false;}}
}
function showConnErr(m){const el=document.getElementById("connErr");if(el){el.textContent="⚠ "+m;el.style.display="block";}}
function disconnect(){stopStream();KEY_ID="";SECRET="";clearInterval(autoInterval);autoInterval=null;keyPanelOpen=true;render();}
function updateTs(){const el=document.getElementById("lastUpd");if(el)el.textContent=`🕐 ${new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",timeZone:"America/New_York"})} ET`;}
function afterRender(){initMobileNav();scrollChatToBottom();}
async function reloadOne(sym){const t=TICKERS.find(x=>x.symbol===sym);if(!t)return;t.loading=true;t.error=null;render();try{t.data=await loadTicker(sym);}catch(e){t.error=e.message;}t.loading=false;updateTs();render();}
async function reloadAll(){await Promise.all(TICKERS.map(async t=>{t.loading=true;t.error=null;try{t.data=await loadTicker(t.symbol);}catch(e){t.error=e.message;}t.loading=false;}));updateTs();render();if(ANTHROPIC_KEY)fetchTopRecs();}
function toggleAuto(){if(autoInterval){clearInterval(autoInterval);autoInterval=null;}else{autoInterval=setInterval(()=>{if(isMarketOpen())reloadAll();},60*60*1000);}render();}
function removeTicker(sym){TICKERS=TICKERS.filter(t=>t.symbol!==sym);if(ws&&ws.readyState===1)ws.send(JSON.stringify({action:"unsubscribe",trades:[sym]}));streamingSymbols=streamingSymbols.filter(s=>s!==sym);render();}
render();
</script>

<!-- PWA -->
<div id="pwa-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1d4ed8;color:#fff;padding:12px 16px;z-index:9999;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -2px 12px rgba(0,0,0,.15)">
  <div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">📈</span><div><div style="font-size:13px;font-weight:700">Install Signal Dashboard V2.2</div><div style="font-size:11px;opacity:.85">Add to home screen for quick access</div></div></div>
  <div style="display:flex;gap:8px;flex-shrink:0"><button id="pwa-dismiss" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer">Not now</button><button id="pwa-install" style="background:#fff;border:none;color:#1d4ed8;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">Install</button></div>
</div>
<script>
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
let deferredPrompt=null;
const banner=document.getElementById("pwa-banner"),installBtn=document.getElementById("pwa-install"),dismissBtn=document.getElementById("pwa-dismiss");
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;if(banner)banner.style.display="flex";});
if(installBtn)installBtn.addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==="accepted")banner.style.display="none";deferredPrompt=null;});
if(dismissBtn)dismissBtn.addEventListener("click",()=>{if(banner)banner.style.display="none";});
window.addEventListener("appinstalled",()=>{if(banner)banner.style.display="none";deferredPrompt=null;});
</script>
